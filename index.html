<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0f766e">
<title>후쿠오카 여행 2026 · 7/15–20</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin></script>
<style>
  :root{
    --bg:#f6f7f5; --card:#fff; --ink:#1f2a37; --sub:#5b6672; --line:#e9ebe7;
    --teal:#0f766e; --teal-soft:#e3f1ef; --teal-ink:#0b5a54;
    --coral:#ef6f5a; --coral-soft:#fdeae6; --gold:#e0a700;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 6px 18px rgba(16,24,40,.06);
    --r:16px; --maxw:760px;
    --d15:#0f766e; --d16:#2f7fd1; --d17:#7b59d1; --d18:#d1568a; --d19:#e08a1e; --d20:#5b6672;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;
    padding-bottom:calc(72px + env(safe-area-inset-bottom));}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 14px;}
  a{color:inherit;}

  header.app{background:linear-gradient(135deg,#0f766e,#12857b 60%,#0b6e7a);color:#fff;
    padding:calc(env(safe-area-inset-top) + 18px) 0 16px;box-shadow:0 4px 16px rgba(15,118,110,.22);}
  header.app .wrap{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  header.app h1{font-size:18px;font-weight:800;margin:0;letter-spacing:-.01em;}
  header.app .meta{font-size:12.5px;opacity:.9;margin-top:3px;font-weight:500;}
  .dday{flex:none;text-align:center;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);
    border-radius:14px;padding:8px 12px;min-width:64px;}
  .dday b{display:block;font-size:20px;font-weight:800;line-height:1.1;} .dday span{font-size:10.5px;opacity:.9;}

  main{padding-top:16px;}
  .panel{display:none;animation:fade .25s ease;} .panel.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .sec-title{font-size:13px;font-weight:800;color:var(--teal-ink);margin:22px 2px 10px;display:flex;align-items:center;gap:7px;}
  .sec-title:first-child{margin-top:4px;}
  .sec-title .pill{font-size:10.5px;font-weight:700;color:var(--sub);background:#eef0ec;border-radius:999px;padding:2px 8px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;margin-bottom:12px;}
  .intro{font-size:12.5px;color:var(--sub);background:#eef3f1;border:1px solid #d9e6e3;border-radius:12px;padding:10px 12px;margin-bottom:4px;}
  .note{font-size:11.5px;color:var(--sub);margin:6px 2px 0;}

  /* day card */
  .day{position:relative;overflow:hidden;}
  .day::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--c,#0f766e);}
  .day-head{display:flex;align-items:baseline;gap:9px;padding-left:6px;}
  .day-head .dnum{font-size:17px;font-weight:800;color:var(--c,#0f766e);}
  .day-head .dlab{font-size:12.5px;color:var(--sub);font-weight:600;}
  .day-mem{padding-left:6px;font-size:12px;color:var(--sub);margin:3px 0 6px;} .day-mem b{color:var(--ink);font-weight:700;}

  /* timeline */
  .tl{position:relative;margin-top:6px;padding-left:18px;}
  .tl::before{content:"";position:absolute;left:5px;top:10px;bottom:16px;width:2px;background:var(--line);}
  .tlstop{position:relative;padding:9px 0;}
  .tlstop::before{content:"";position:absolute;left:-16.5px;top:13px;width:10px;height:10px;border-radius:50%;
    background:#fff;border:2.5px solid var(--c,#0f766e);box-sizing:border-box;}
  .tlstop.done::before{background:var(--c,#0f766e);}
  .tlrow{display:flex;gap:9px;align-items:flex-start;}
  .tltime{flex:none;width:44px;font-size:11px;font-weight:800;color:var(--c,#0f766e);padding-top:2px;line-height:1.35;}
  .tlbody{flex:1;min-width:0;}
  .tlname{font-weight:700;font-size:14px;}
  .tldesc{font-size:12px;color:var(--sub);margin-top:2px;}
  .tlstop.done .tlname,.tlstop.done .tldesc{text-decoration:line-through;opacity:.45;}
  .tlacts{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;align-items:center;}
  .tlthumb{flex:none;width:54px;height:54px;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:#eef0ec;cursor:pointer;}
  .tlthumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .st-tag{font-size:10px;font-weight:800;border-radius:6px;padding:1px 6px;margin-left:5px;vertical-align:middle;white-space:nowrap;}
  .st-tag.fix{color:#fff;background:#1f2a37;}      /* 고정 */
  .st-tag.conf{color:#0b5a54;background:#cdeae5;}  /* 확정 */
  .st-tag.draft{color:#5b6672;background:#eef0ec;} /* 초안 */
  .st-tag.und{color:#9a6b00;background:#fff3cf;}   /* 미정/확인 */
  .st-tag.ys{color:#7b3fb0;background:#efe3fb;}    /* 영석님 지정 */
  .move{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#475569;background:#eef1f5;
    border:1px solid #e1e6ee;border-radius:8px;padding:3px 8px;margin:6px 0 0;}
  .move svg{width:12px;height:12px;opacity:.7;}

  .mlink{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;color:var(--teal-ink);background:var(--teal-soft);border-radius:999px;padding:4px 9px;text-decoration:none;}
  .mlink:active{transform:scale(.97);} .mlink svg{width:13px;height:13px;}
  .mlink.dir{color:#8a4a00;background:#fbf0db;}
  .toggle{flex:none;width:25px;height:25px;border-radius:50%;border:2px solid var(--line);background:#fff;cursor:pointer;
    display:grid;place-items:center;padding:0;color:transparent;transition:.15s;align-self:flex-start;margin-top:1px;}
  .toggle svg{width:13px;height:13px;} .toggle.is-on{background:var(--teal);border-color:var(--teal);color:#fff;}

  .callout{display:flex;gap:9px;background:var(--coral-soft);border:1px solid #f6cdc4;border-radius:12px;padding:9px 11px;margin:8px 0 2px;font-size:12px;color:#8a3a2b;}
  .callout svg{flex:none;width:15px;height:15px;margin-top:1px;} .callout b{color:#b5402c;}

  /* gallery (food/place) */
  .gallery{display:flex;gap:6px;overflow-x:auto;margin-top:9px;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
  .thumb{flex:none;border-radius:10px;overflow:hidden;border:1px solid var(--line);cursor:pointer;background:#eef0ec;line-height:0;}
  .thumb img{height:86px;width:auto;max-width:150px;object-fit:cover;display:block;}

  .item{display:flex;align-items:flex-start;gap:11px;padding:12px 0;border-top:1px solid var(--line);}
  .item:first-child{border-top:none;}
  .item .ic-star{flex:none;width:30px;height:30px;border:0;background:none;cursor:pointer;color:#cfd4cd;font-size:21px;line-height:1;padding:0;}
  .item .ic-star.is-on{color:var(--gold);}
  .item .it-body{flex:1;min-width:0;} .item .it-name{font-weight:700;font-size:14.5px;} .item .it-sub{font-size:12px;color:var(--sub);margin-top:2px;}
  .tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;margin-left:6px;vertical-align:middle;}
  .tag.hi{background:#fde9e6;color:#c0432e;} .tag.mid{background:#eef1ee;color:#5b6672;} .tag.no{background:#f0f0f0;color:#999;text-decoration:line-through;}

  .check{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-top:1px solid var(--line);cursor:pointer;}
  .check:first-child{border-top:none;}
  .check .box{flex:none;width:24px;height:24px;border-radius:7px;border:2px solid #cfd4cd;background:#fff;display:grid;place-items:center;color:transparent;transition:.15s;margin-top:1px;}
  .check .box svg{width:14px;height:14px;} .check.is-on .box{background:var(--teal);border-color:var(--teal);color:#fff;}
  .check .ck-body{flex:1;min-width:0;} .check .ck-name{font-weight:600;font-size:14px;} .check.is-on .ck-name{text-decoration:line-through;color:var(--sub);} .check .ck-sub{font-size:12px;color:var(--sub);margin-top:2px;}
  .decision .opts{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;} .opt{font-size:12px;font-weight:600;background:#f3f5f2;border:1px solid var(--line);border-radius:999px;padding:4px 10px;}
  .badge-und{display:inline-block;font-size:10px;font-weight:800;background:#fff3cf;color:#9a6b00;border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle;}

  .kv{display:flex;gap:10px;padding:7px 0;border-top:1px solid var(--line);font-size:13px;} .kv:first-child{border-top:none;}
  .kv .k{flex:none;width:88px;color:var(--sub);font-weight:600;font-size:12px;} .kv .v{flex:1;min-width:0;} .kv .v b{font-weight:700;}
  .copy{font-size:11px;font-weight:700;color:var(--teal-ink);background:var(--teal-soft);border:0;border-radius:8px;padding:3px 8px;margin-left:6px;cursor:pointer;}
  .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -2px;}
  table.att{border-collapse:collapse;width:100%;font-size:12.5px;min-width:360px;}
  table.att th,table.att td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--line);white-space:nowrap;}
  table.att th{background:#f3f5f2;font-weight:700;color:var(--sub);font-size:11.5px;}
  table.att td.name{text-align:left;font-weight:700;} table.att .yes{color:var(--teal);font-weight:800;} table.att .no{color:#c9ccc7;} table.att .star{color:var(--coral);font-weight:800;}
  .legend{font-size:11.5px;color:var(--sub);margin-top:8px;line-height:1.7;}
  .map-embed{border:0;width:100%;height:220px;border-radius:12px;margin-top:4px;background:#eef0ec;}

  /* map */
  #map{height:280px;border-radius:12px;overflow:hidden;z-index:0;border:1px solid var(--line);}
  .mapfail{height:110px;display:grid;place-items:center;text-align:center;color:#8a3a2b;font-size:13px;padding:16px;background:#fdeae6;border-radius:12px;}
  .pin{width:26px;height:26px;border-radius:50%;color:#fff;font-weight:800;font-size:13px;display:grid;place-items:center;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.35);}
  .pin.home{font-size:14px;}
  .routelist{list-style:none;margin:12px 0 0;padding:0;}
  .routelist li{display:flex;align-items:center;gap:9px;padding:5px 0;font-size:13px;}
  .routelist .rn{flex:none;width:22px;height:22px;border-radius:50%;color:#fff;font-weight:800;font-size:11px;display:grid;place-items:center;}
  .routelist .rt{flex:none;width:46px;color:var(--sub);font-size:11px;font-weight:700;}
  .bigbtn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;margin-top:12px;background:var(--teal);color:#fff;font-weight:800;font-size:13.5px;border:0;border-radius:12px;padding:13px;text-decoration:none;}
  .bigbtn svg{width:16px;height:16px;}

  nav.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom));display:flex;}
  nav.tabbar button{flex:1;border:0;background:none;padding:5px 2px;cursor:pointer;color:#98a0a8;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:700;}
  nav.tabbar button svg{width:22px;height:22px;} nav.tabbar button.active{color:var(--teal);}
  .foot{text-align:center;color:#aab0b6;font-size:11px;padding:18px 0 8px;}
  .foot button{background:none;border:1px solid var(--line);border-radius:8px;color:var(--sub);font-size:11px;padding:5px 10px;cursor:pointer;margin-top:6px;}
  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);background:#1f2a37;color:#fff;font-size:12.5px;font-weight:600;padding:9px 16px;border-radius:999px;opacity:0;pointer-events:none;transition:.25s;z-index:120;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .lb{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:200;padding:14px;}
  .lb.show{display:flex;} .lb img{max-width:100%;max-height:100%;border-radius:10px;}
  @media(min-width:620px){ header.app h1{font-size:20px;} #map{height:360px;} }
</style>
</head>
<body>
<header class="app">
  <div class="wrap">
    <div><h1>후쿠오카 여행 🇯🇵</h1>
      <div class="meta">2026.7.15(수) – 7.20(월) · 영석·수아·수경 / 효리누나·5번(16–17)</div></div>
    <div class="dday"><b id="dday">D-?</b><span>7/15 출발</span></div>
  </div>
</header>

<main class="wrap">
  <section class="panel active" id="tab-plan"></section>
  <section class="panel" id="tab-food"></section>
  <section class="panel" id="tab-place"></section>
  <section class="panel" id="tab-decide"></section>
  <section class="panel" id="tab-pack"></section>
  <section class="panel" id="tab-info"></section>

];

const DAYS = [
  {d:"15", dow:"수", c:"--d15", mem:"<b>영석·수아·수경</b> 도착 (효리·5번 미참)", note:"순서 변경은 영석님 결정 (참고: 와사몬 17시 오픈 · 백스테이지는 저녁 재즈 라이브 중심)",

const $ = s => document.querySelector(s);
const enc = encodeURIComponent;
const mapU = q => "https://www.google.com/maps/search/?api=1&query=" + enc(q);
const dirU = q => "https://www.google.com/maps/dir/?api=1&origin=" + enc(ACCOM) + "&destination=" + enc(q);
const PIN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-6.2 7-11a7 7 0 1 0-14 0c0 4.8 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>';
const ARROW='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
const CK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12.5l4.5 4.5L19 7"/></svg>';
const TRAIN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="3" width="12" height="14" rx="2"/><path d="M6 11h12M9 20l-2 2M15 20l2 2M9 17v1M15 17v1"/></svg>';
const mapLink = q => q ? `<a class="mlink" target="_blank" rel="noopener" href="${mapU(q)}">${PIN}지도</a>` : "";
const dirLink = q => q ? `<a class="mlink dir" target="_blank" rel="noopener" href="${dirU(q)}">${ARROW}길찾기</a>` : "";
const stTag = tag => { if(!tag) return ""; const m={"고정":"fix","확정":"conf","초안":"draft","초안/확인":"und","미정":"und","영석님":"ys"}; return `<span class="st-tag ${m[tag]||'draft'}">${tag}</span>`; };
const thumb1 = key => { const a=key&&IMG[key]; return a&&a.length?`<div class="tlthumb" data-full="img/${a[0]}"><img loading="lazy" src="img/${a[0]}" alt=""></div>`:""; };
const gallery = key => { const a=key&&IMG[key]; return a&&a.length?`<div class="gallery">`+a.map(f=>`<div class="thumb" data-full="img/${f}"><img loading="lazy" src="img/${f}" alt=""></div>`).join("")+`</div>`:""; };

function renderPlan(){
  const stops = ROUTE;
  let mapcard = `<div class="card">
    <div class="sec-title" style="margin-top:0">📍 1일차 위치 <span class="pill">순서는 아래 일정</span></div>
    <div id="map"></div>
    <a class="bigbtn" id="grouteBtn" target="_blank" rel="noopener" href="#">${ARROW.replace('stroke="currentColor"','stroke="white"')}구글맵에서 전체 경로 길찾기</a>
    <div class="note">핀은 위치만 표시(연결선 없음) · 순서/동선 변경은 영석님 결정.</div>
  </div>`;

  let h = mapcard + `<div class="intro">📍 장소마다 <b>지도</b>·<b>길찾기</b>(숙소 출발) · 동그라미로 완료 체크 · 사진 탭하면 확대. 교통편은 확인된 것만 표기.</div>`;
  DAYS.forEach(day=>{
    h += `<div class="card day" style="--c:var(${day.c})">
      <div class="day-head"><span class="dnum">${day.d}일</span><span class="dlab">7/${day.d} (${day.dow})</span></div>
      <div class="day-mem">${day.mem}</div><div class="tl">`;
    day.stops.forEach((st,si)=>{
      const id = `stop-${day.d}-${si}`;
      h += `<div class="tlstop" data-stop data-id="${id}">
        <div class="tlrow">
          <div class="tltime">${st.t||""}</div>
          <div class="tlbody">
            <div class="tlname">${st.n}${stTag(st.tag)}</div>
            ${st.s?`<div class="tldesc">${st.s}</div>`:""}
            ${st.move?`<div class="move">${TRAIN}${st.move}</div>`:""}
            ${st.festival?`<div class="callout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg><div><b>이동</b> — 하카타→고쿠라 신칸센 약 15~18분(일요일 운행) 또는 특급 소닉 약 40~50분 · 小倉역→고쿠라성 도보 약 15분 · 정확한 시각은 당일 확인.</div></div>`:""}
            <div class="tlacts">${thumb1(st.img)}${mapLink(st.q)}${st.dir?dirLink(st.q):""}</div>
          </div>
          <button class="toggle js-toggle" data-id="${id}" data-target=".tlstop" aria-label="완료">${CK}</button>
        </div></div>`;
    });
    h += `</div>${day.note?`<div class="note" style="padding-left:6px">${day.note}</div>`:""}</div>`;
  });
  $("#tab-plan").innerHTML = h;
  const wp = stops.map(s=>enc(s.q)).join("|");
  $("#grouteBtn").href = "https://www.google.com/maps/dir/?api=1&travelmode=walking&origin="+enc(ACCOM)+"&destination="+enc(ACCOM)+"&waypoints="+wp;
}

  GROUPS.forEach((grp,gi)=>{
    h += `<div class="sec-title">${grp.g}</div><div class="card">`;
    grp.items.forEach((it,ii)=>{
      const id = `${prefix}-${gi}-${ii}`;
      const tag = it.t==="hi"?`<span class="tag hi">강추</span>`:it.t==="no"?`<span class="tag no">제외</span>`:"";
      const star = it.t!=="no" ? `<button class="ic-star js-toggle" data-id="${id}" aria-label="가고싶음">★</button>` : `<span style="width:30px;flex:none"></span>`;
      h += `<div class="item">${star}<div class="it-body">
        <div class="it-name">${it.n}${tag}</div>${it.sub?`<div class="it-sub">${it.sub}</div>`:""}
        ${it.q?`<div style="margin-top:7px">${mapLink(it.q)}</div>`:""}${gallery(it.img)}</div></div>`;
    });
    h += `</div>`;
  });
  target.innerHTML = h;
}

  DECISIONS.forEach((dc,i)=>{

    h += `<div class="card decision"><div class="check js-check" data-id="${id}"${dc.done?' data-default="1"':''}>

      <div class="opts">${dc.opts.map(o=>`<span class="opt">${o}</span>`).join("")}</div></div>`;

}
function renderPack(){

    h += `</div>`;

}

/* ===================== 상태 ===================== */
const KEY = "fukuoka2026.v3";
let STATE = {};
try{ STATE = JSON.parse(localStorage.getItem(KEY) || "{}"); }catch(e){ STATE = {}; }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(STATE)); }catch(e){} }
function applyState(){
  document.querySelectorAll(".js-toggle, .js-check").forEach(el=>{
    let on = !!STATE[el.dataset.id];
    if(el.dataset.default && STATE[el.dataset.id]===undefined) on = true;
    el.classList.toggle("is-on", on);
    const tgt = el.dataset.target; if(tgt){ const p=el.closest(tgt); if(p) p.classList.toggle("done", on); }
  });
}
document.addEventListener("click", e=>{
  const el = e.target.closest(".js-toggle, .js-check");
  if(el){ STATE[el.dataset.id] = !el.classList.contains("is-on"); save(); applyState(); return; }
  const th = e.target.closest("[data-full]");
  if(th){ $("#lbimg").src = th.dataset.full; $("#lb").classList.add("show"); return; }
  if(e.target.closest("#lb")){ $("#lb").classList.remove("show"); return; }
  const cp = e.target.closest(".copy");
  if(cp){ const t=cp.dataset.copy; (navigator.clipboard?navigator.clipboard.writeText(t):Promise.reject()).then(()=>toast("복사됨: "+t)).catch(()=>toast(t)); }
});

/* ===================== 지도 (깔끔 · 연결선 없음) ===================== */
let MAP = null;
function initMap(){
  const el = document.getElementById("map");
  if(typeof L === "undefined"){ el.outerHTML = `<div class="mapfail">지도를 불러오지 못했습니다(인터넷 필요).<br>아래 ‘구글맵 전체 경로 길찾기’를 이용하세요.</div>`; return; }
  MAP = L.map("map",{scrollWheelZoom:false});
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{maxZoom:20,subdomains:"abcd",attribution:"© OpenStreetMap © CARTO"}).addTo(MAP);
  const pts = [ACCOM_LL];
  L.marker(ACCOM_LL,{icon:L.divIcon({className:"",html:`<div class="pin home" style="background:#0b5a54">🏠</div>`,iconSize:[26,26],iconAnchor:[13,13]})}).addTo(MAP)
    .bindPopup(`<b>숙소 · 레지던스 타카사고</b><br><a href="${mapU(ACCOM)}" target="_blank" rel="noopener">구글맵 ↗</a>`);
  ROUTE.forEach((s,i)=>{
    pts.push([s.lat,s.lon]);
    const thumb = (s.img && IMG[s.img]) ? `<img src="img/${IMG[s.img][0]}" style="width:100%;border-radius:8px;margin-top:6px">` : "";
    L.marker([s.lat,s.lon],{icon:L.divIcon({className:"",html:`<div class="pin" style="background:${KIND_COLOR[s.kind]}">${i+1}</div>`,iconSize:[26,26],iconAnchor:[13,13]})}).addTo(MAP)
      .bindPopup(`<b>${i+1}. ${s.name}</b><br><span style="color:#5b6672">${s.time}</span>${thumb}<br><a href="${mapU(s.q)}" target="_blank" rel="noopener">구글맵 ↗</a>`);
  });
  MAP.fitBounds(pts,{padding:[36,36]});
}

/* ===================== 탭 ===================== */
function buildNav(){
  $("#tabbar").innerHTML = NAV.map(t=>`<button data-tab="${t.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${t.icon}</svg>${t.label}</button>`).join("");
  document.querySelectorAll("#tabbar button").forEach(b=> b.addEventListener("click", ()=>activate(b.dataset.tab)));
}
function activate(id){
  document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("active", p.id==="tab-"+id));
  document.querySelectorAll("#tabbar button").forEach(b=>b.classList.toggle("active", b.dataset.tab===id));
  STATE.__tab = id; save(); window.scrollTo({top:0});
  if(id==="plan" && MAP) setTimeout(()=>MAP.invalidateSize(), 120);
}
function setDday(){ try{ const now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate()),ds=new Date(2026,6,15),de=new Date(2026,6,20);
  const diff=Math.round((ds-today)/86400000); $("#dday").textContent = today<ds?"D-"+diff:today<=de?"여행중":"여행끝"; }catch(e){} }
let toastTimer; function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1600); }
$("#resetBtn").addEventListener("click", ()=>{ if(confirm("초기화할까요?")){ const tab=STATE.__tab; STATE={}; if(tab)STATE.__tab=tab; save(); applyState(); toast("초기화 완료"); } });

renderPlan(); renderItems($("#tab-food"),FOOD,"food"); renderItems($("#tab-place"),PLACES,"place"); renderDecide(); renderPack(); renderInfo();
buildNav(); applyState(); setDday(); initMap();
activate(STATE.__tab && NAV.some(n=>n.id===STATE.__tab) ? STATE.__tab : "plan");
</script>
