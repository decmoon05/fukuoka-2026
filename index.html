<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0f766e">
<title>후쿠오카 여행 2026 · 7/15–20</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#f6f7f5; --card:#fff; --ink:#1f2a37; --sub:#5b6672; --line:#e9ebe7;
    --teal:#0f766e; --teal-soft:#e3f1ef; --teal-ink:#0b5a54;
    --coral:#ef6f5a; --coral-soft:#fdeae6; --gold:#e0a700;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 6px 18px rgba(16,24,40,.06);
    --r:16px; --maxw:760px;
    --d15:#0f766e; --d16:#2f7fd1; --d17:#7b59d1; --d18:#d1568a; --d19:#e08a1e; --d20:#5b6672;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;
    padding-bottom:calc(72px + env(safe-area-inset-bottom));}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 14px;}
  a{color:inherit;}

  header.app{background:linear-gradient(135deg,#0f766e,#12857b 60%,#0b6e7a);color:#fff;
    padding:calc(env(safe-area-inset-top) + 18px) 0 16px;box-shadow:0 4px 16px rgba(15,118,110,.22);}
  header.app .wrap{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  header.app h1{font-size:18px;font-weight:800;margin:0;letter-spacing:-.01em;}
  header.app .meta{font-size:12.5px;opacity:.9;margin-top:3px;font-weight:500;}
  .dday{flex:none;text-align:center;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);
    border-radius:14px;padding:8px 12px;min-width:64px;}
  .dday b{display:block;font-size:20px;font-weight:800;line-height:1.1;} .dday span{font-size:10.5px;opacity:.9;}

  main{padding-top:16px;}
  .panel{display:none;animation:fade .25s ease;} .panel.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .sec-title{font-size:13px;font-weight:800;color:var(--teal-ink);margin:22px 2px 10px;display:flex;align-items:center;gap:7px;}
  .sec-title:first-child{margin-top:4px;}
  .sec-title .pill{font-size:10.5px;font-weight:700;color:var(--sub);background:#eef0ec;border-radius:999px;padding:2px 8px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;margin-bottom:12px;}
  .intro{font-size:12.5px;color:var(--sub);background:#eef3f1;border:1px solid #d9e6e3;border-radius:12px;padding:10px 12px;margin-bottom:4px;}
  .note{font-size:11.5px;color:var(--sub);margin:6px 2px 0;}

  /* day card */
  .day{position:relative;overflow:hidden;}
  .day::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--c,#0f766e);}
  .day-head{display:flex;align-items:baseline;gap:9px;padding-left:6px;}
  .day-head .dnum{font-size:17px;font-weight:800;color:var(--c,#0f766e);}
  .day-head .dlab{font-size:12.5px;color:var(--sub);font-weight:600;}
  .day-mem{padding-left:6px;font-size:12px;color:var(--sub);margin:3px 0 6px;} .day-mem b{color:var(--ink);font-weight:700;}

  /* timeline */
  .tl{position:relative;margin-top:6px;padding-left:18px;}
  .tl::before{content:"";position:absolute;left:5px;top:10px;bottom:16px;width:2px;background:var(--line);}
  .tlstop{position:relative;padding:9px 0;}
  .tlstop::before{content:"";position:absolute;left:-16.5px;top:13px;width:10px;height:10px;border-radius:50%;
    background:#fff;border:2.5px solid var(--c,#0f766e);box-sizing:border-box;}
  .tlstop.done::before{background:var(--c,#0f766e);}
  .tlrow{display:flex;gap:9px;align-items:flex-start;}
  .tltime{flex:none;width:44px;font-size:11px;font-weight:800;color:var(--c,#0f766e);padding-top:2px;line-height:1.35;}
  .tlbody{flex:1;min-width:0;}
  .tlname{font-weight:700;font-size:14px;}
  .tldesc{font-size:12px;color:var(--sub);margin-top:2px;}
  .tlstop.done .tlname,.tlstop.done .tldesc{text-decoration:line-through;opacity:.45;}
  .tlacts{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;align-items:center;}
  .tlthumb{flex:none;width:54px;height:54px;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:#eef0ec;cursor:pointer;}
  .tlthumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .tlphoto{flex:none;width:96px;height:96px;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:#eef0ec;cursor:pointer;align-self:flex-start;}
  .tlphoto img{width:100%;height:100%;object-fit:cover;display:block;}
  .st-tag{font-size:10px;font-weight:800;border-radius:6px;padding:1px 6px;margin-left:5px;vertical-align:middle;white-space:nowrap;}
  .st-tag.fix{color:#fff;background:#1f2a37;}      /* 고정 */
  .st-tag.conf{color:#0b5a54;background:#cdeae5;}  /* 확정 */
  .st-tag.draft{color:#5b6672;background:#eef0ec;} /* 초안 */
  .st-tag.und{color:#9a6b00;background:#fff3cf;}   /* 미정/확인 */
  .st-tag.ys{color:#7b3fb0;background:#efe3fb;}    /* 영석님 지정 */
  .move{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#475569;background:#eef1f5;
    border:1px solid #e1e6ee;border-radius:8px;padding:3px 8px;margin:6px 0 0;}
  .move svg{width:12px;height:12px;opacity:.7;}
  .movecard{margin-top:8px;background:#f7f9fb;border:1px solid #e6ebf0;border-radius:12px;padding:10px;}
  .movestrip{display:flex;align-items:center;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch;}
  .mvnode{flex:none;font-size:11px;font-weight:800;color:#1f2a37;background:#fff;border:1px solid #d7dee6;border-radius:8px;padding:5px 8px;white-space:nowrap;}
  .mvnode.start{background:#eef3f1;border-color:#cfe0db;}
  .mvseg{flex:none;display:flex;flex-direction:column;align-items:center;min-width:80px;padding:0 2px;}
  .mvseg .mvlabel{font-size:9.5px;font-weight:800;color:var(--lc,#667);white-space:nowrap;margin-bottom:3px;}
  .mvseg .mvline{height:4px;width:88%;border-radius:2px;background:var(--lc,#999);}
  .mvseg.walk .mvline{height:0;border-top:3px dotted #b3bcc6;background:none;}
  .mvseg .mvmin{font-size:9px;color:#8a93a0;font-weight:700;margin-top:3px;}
  .movetotal{font-size:11px;color:#5b6672;font-weight:700;margin-top:8px;}
  .movebtn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11.5px;font-weight:800;color:#fff;background:#2f6fd1;border-radius:999px;padding:6px 12px;text-decoration:none;}
  .movebtn svg{width:13px;height:13px;}
  .movebtn.alt{background:#64748b;margin-top:8px;}
  .gmap{width:100%;height:300px;border:0;border-radius:12px;background:#eef0ec;}

  .mlink{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;color:var(--teal-ink);background:var(--teal-soft);border-radius:999px;padding:4px 9px;text-decoration:none;}
  .mlink:active{transform:scale(.97);} .mlink svg{width:13px;height:13px;}
  .mlink.dir{color:#8a4a00;background:#fbf0db;}
  .toggle{flex:none;width:25px;height:25px;border-radius:50%;border:2px solid var(--line);background:#fff;cursor:pointer;
    display:grid;place-items:center;padding:0;color:transparent;transition:.15s;align-self:flex-start;margin-top:1px;}
  .toggle svg{width:13px;height:13px;} .toggle.is-on{background:var(--teal);border-color:var(--teal);color:#fff;}

  .callout{display:flex;gap:9px;background:var(--coral-soft);border:1px solid #f6cdc4;border-radius:12px;padding:9px 11px;margin:8px 0 2px;font-size:12px;color:#8a3a2b;}
  .callout svg{flex:none;width:15px;height:15px;margin-top:1px;} .callout b{color:#b5402c;}

  /* gallery (food/place) */
  .gallery{display:flex;gap:6px;overflow-x:auto;margin-top:9px;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
  .thumb{flex:none;border-radius:10px;overflow:hidden;border:1px solid var(--line);cursor:pointer;background:#eef0ec;line-height:0;}
  .thumb img{height:86px;width:auto;max-width:150px;object-fit:cover;display:block;}

  .item{display:flex;align-items:flex-start;gap:11px;padding:12px 0;border-top:1px solid var(--line);}
  .item:first-child{border-top:none;}
  .item .ic-star{flex:none;width:30px;height:30px;border:0;background:none;cursor:pointer;color:#cfd4cd;font-size:21px;line-height:1;padding:0;}
  .item .ic-star.is-on{color:var(--gold);}
  .item .it-body{flex:1;min-width:0;} .item .it-name{font-weight:700;font-size:14.5px;} .item .it-sub{font-size:11.5px;color:var(--sub);margin-top:3px;}
  .it-desc{font-size:12.5px;color:var(--ink);margin-top:3px;line-height:1.5;}
  .numbadge{display:inline-grid;place-items:center;width:18px;height:18px;border-radius:50%;background:var(--c,#0f766e);color:#fff;font-size:10px;font-weight:800;margin-right:6px;vertical-align:middle;}
  .js-focus{cursor:pointer;}
  .tlname.js-focus:active,.it-name.js-focus:active{opacity:.55;}
  .memo-input{width:100%;min-height:72px;border:1px solid var(--line);border-radius:8px;padding:9px;font-size:13px;box-sizing:border-box;font-family:inherit;resize:vertical;}
  .memo-item{padding:11px 0;border-top:1px solid var(--line);} .memo-item:first-child{border-top:none;}
  .memo-h{display:flex;justify-content:space-between;align-items:center;} .memo-h b{font-size:13px;color:var(--teal-ink);}
  .memo-t{font-size:13px;margin-top:5px;white-space:pre-wrap;line-height:1.55;}
  .idel{flex:none;border:0;background:#f2efee;color:#b0453a;width:24px;height:24px;border-radius:50%;font-size:12px;font-weight:800;cursor:pointer;align-self:flex-start;margin-left:6px;}
  .idel:active{background:#fbe3df;}
  .dec-top{display:flex;align-items:flex-start;gap:8px;} .dec-top .check{flex:1;}
  .udadd{padding:12px;}
  .tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;margin-left:6px;vertical-align:middle;}
  .tag.hi{background:#fde9e6;color:#c0432e;} .tag.mid{background:#eef1ee;color:#5b6672;} .tag.no{background:#f0f0f0;color:#999;text-decoration:line-through;}

  .check{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-top:1px solid var(--line);cursor:pointer;}
  .check:first-child{border-top:none;}
  .check .box{flex:none;width:24px;height:24px;border-radius:7px;border:2px solid #cfd4cd;background:#fff;display:grid;place-items:center;color:transparent;transition:.15s;margin-top:1px;}
  .check .box svg{width:14px;height:14px;} .check.is-on .box{background:var(--teal);border-color:var(--teal);color:#fff;}
  .check .ck-body{flex:1;min-width:0;} .check .ck-name{font-weight:600;font-size:14px;} .check.is-on .ck-name{text-decoration:line-through;color:var(--sub);} .check .ck-sub{font-size:12px;color:var(--sub);margin-top:2px;}
  .decision .opts{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;} .opt{font-size:12px;font-weight:600;background:#f3f5f2;border:1px solid var(--line);border-radius:999px;padding:4px 10px;}
  .badge-und{display:inline-block;font-size:10px;font-weight:800;background:#fff3cf;color:#9a6b00;border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle;}

  .kv{display:flex;gap:10px;padding:7px 0;border-top:1px solid var(--line);font-size:13px;} .kv:first-child{border-top:none;}
  .kv .k{flex:none;width:88px;color:var(--sub);font-weight:600;font-size:12px;} .kv .v{flex:1;min-width:0;} .kv .v b{font-weight:700;}
  .copy{font-size:11px;font-weight:700;color:var(--teal-ink);background:var(--teal-soft);border:0;border-radius:8px;padding:3px 8px;margin-left:6px;cursor:pointer;}
  .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -2px;}
  table.att{border-collapse:collapse;width:100%;font-size:12.5px;min-width:360px;}
  table.att th,table.att td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--line);white-space:nowrap;}
  table.att th{background:#f3f5f2;font-weight:700;color:var(--sub);font-size:11.5px;}
  table.att td.name{text-align:left;font-weight:700;} table.att .yes{color:var(--teal);font-weight:800;} table.att .no{color:#c9ccc7;} table.att .star{color:var(--coral);font-weight:800;}
  .legend{font-size:11.5px;color:var(--sub);margin-top:8px;line-height:1.7;}
  .map-embed{border:0;width:100%;height:220px;border-radius:12px;margin-top:4px;background:#eef0ec;}

  /* map */
  #map{height:280px;border-radius:12px;overflow:hidden;z-index:0;border:1px solid var(--line);}
  .mapfail{height:110px;display:grid;place-items:center;text-align:center;color:#8a3a2b;font-size:13px;padding:16px;background:#fdeae6;border-radius:12px;}
  .pin{width:26px;height:26px;border-radius:50%;color:#fff;font-weight:800;font-size:13px;display:grid;place-items:center;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.35);}
  .pin.home{font-size:14px;}
  .routelist{list-style:none;margin:12px 0 0;padding:0;}
  .routelist li{display:flex;align-items:center;gap:9px;padding:5px 0;font-size:13px;}
  .routelist .rn{flex:none;width:22px;height:22px;border-radius:50%;color:#fff;font-weight:800;font-size:11px;display:grid;place-items:center;}
  .routelist .rt{flex:none;width:46px;color:var(--sub);font-size:11px;font-weight:700;}
  .bigbtn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;margin-top:12px;background:var(--teal);color:#fff;font-weight:800;font-size:13.5px;border:0;border-radius:12px;padding:13px;text-decoration:none;}
  .bigbtn svg{width:16px;height:16px;}

  nav.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom));display:flex;}
  nav.tabbar button{flex:1;border:0;background:none;padding:5px 2px;cursor:pointer;color:#98a0a8;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:700;}
  nav.tabbar button svg{width:22px;height:22px;} nav.tabbar button.active{color:var(--teal);}
  .foot{text-align:center;color:#aab0b6;font-size:11px;padding:18px 0 8px;}
  .foot button{background:none;border:1px solid var(--line);border-radius:8px;color:var(--sub);font-size:11px;padding:5px 10px;cursor:pointer;margin-top:6px;}
  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);background:#1f2a37;color:#fff;font-size:12.5px;font-weight:600;padding:9px 16px;border-radius:999px;opacity:0;pointer-events:none;transition:.25s;z-index:120;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  /* 멤버 참여 차트 */
  .mgrid{display:grid;grid-template-columns:50px repeat(6,1fr);gap:4px;margin-bottom:4px;}
  .mg-h{font-size:10px;font-weight:700;color:var(--sub);text-align:center;align-self:end;padding-bottom:2px;}
  .mg-name{font-size:12px;font-weight:700;display:flex;align-items:center;}
  .mg-cell{height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;}
  .mg-cell.y{background:#0f766e;color:#fff;} .mg-cell.n{background:#eef0ec;} .mg-cell.x{background:#fbe3df;color:#c0432e;} .mg-cell.p{background:#bfe3dd;color:#0b5a54;}
  .mc-sub{font-size:12px;font-weight:700;color:#0b5a54;margin:12px 0 7px;padding-top:9px;border-top:1px dashed var(--line);}
  /* 한눈에 간트 */
  .g-axis{display:flex;gap:8px;margin-bottom:2px;}
  .gantt-day{display:flex;align-items:stretch;gap:8px;margin:5px 0;}
  .g-label{flex:none;width:40px;font-size:11px;font-weight:800;text-align:center;display:flex;flex-direction:column;justify-content:center;line-height:1.15;}
  .g-label span{font-size:9px;color:var(--sub);font-weight:600;}
  .g-track{position:relative;flex:1;height:34px;background:#f4f6f4;border-radius:8px;overflow:hidden;}
  .g-axis .g-track{height:14px;background:none;overflow:visible;}
  .g-hr{position:absolute;top:0;font-size:9px;color:#aab0b6;transform:translateX(-50%);}
  .g-grid{position:absolute;top:0;bottom:0;width:1px;background:#e4e8e4;}
  .g-block{position:absolute;top:4px;bottom:4px;border-radius:5px;display:flex;align-items:center;padding:0 5px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.12);}
  .g-block span{font-size:9px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  /* 한눈에 차트 크게 */
  .g-track{height:50px;} .gantt-day{margin:9px 0;} .g-label{width:50px;font-size:13px;} .g-label span{font-size:10.5px;} .g-block span{font-size:11px;} .g-hr{font-size:10.5px;} .g-block{top:5px;bottom:5px;border-radius:6px;}
  /* 몰 층별 트리 */
  .mall{margin-top:9px;border:1px solid var(--line);border-radius:10px;background:#fafbfa;}
  .mall summary{cursor:pointer;font-size:12px;font-weight:800;color:var(--teal-ink);padding:9px 10px;list-style:none;}
  .mall summary::-webkit-details-marker{display:none;}
  .mall summary::before{content:"▸ ";} .mall[open] summary::before{content:"▾ ";}
  .floorbtns{display:flex;flex-wrap:wrap;gap:4px;padding:0 10px 7px;}
  .floorbtn{font-size:10.5px;font-weight:800;border:1px solid var(--line);background:#fff;border-radius:8px;padding:4px 8px;cursor:pointer;color:var(--sub);}
  .floorbtn.sel{background:var(--teal);color:#fff;border-color:var(--teal);}
  .floorview{padding:0 10px 4px;}
  .mtree{padding:0 10px 10px;}
  .mtf{display:flex;gap:8px;padding:5px 0;font-size:12px;border-top:1px dashed var(--line);}
  .mtf-f{flex:none;width:62px;font-weight:800;color:var(--teal-ink);}
  .mtf-v{flex:1;color:var(--ink);}
  .mallimg{margin-top:8px;cursor:pointer;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .mallimg img{width:100%;display:block;}
  /* 분할 지도 패널 */
  #mappane{position:fixed;inset:0;z-index:150;background:#fff;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;}
  #mappane.open{transform:none;}
  .mapbar{flex:none;display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--line);font-weight:800;font-size:14px;}
  .mapbar button{border:0;background:#eef0ec;border-radius:8px;width:30px;height:30px;font-size:15px;cursor:pointer;}
  #bigmap{flex:1;min-height:200px;z-index:0;}
  #mapctrl{flex:none;border-top:2px solid var(--line);padding:12px;max-height:52vh;overflow:auto;background:#fff;}
  .bpin{width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.45);}
  .rp-row{display:flex;gap:6px;align-items:center;margin-bottom:8px;}
  .rp-row select{flex:1;min-width:0;font-size:12px;padding:7px;border:1px solid var(--line);border-radius:8px;background:#fff;}
  #rpGo{flex:none;background:var(--teal);color:#fff;border:0;border-radius:8px;padding:8px 12px;font-weight:800;font-size:12px;cursor:pointer;}
  .rpglink{flex:none;background:#2f6fd1;color:#fff;border-radius:8px;padding:8px 10px;font-weight:800;font-size:12px;text-decoration:none;}
  .rp-hint{font-size:11px;color:var(--sub);margin:6px 0;line-height:1.6;}

function renderMove(mv){
  if(!mv) return "";
  if(typeof mv==="string") return `<div class="move">${TRAIN}${mv}</div>`;
  let s=`<span class="mvnode start">${mv.start}</span>`;
  (mv.segs||[]).forEach(g=>{ const w=g.type==="walk"; s+=`<span class="mvseg ${w?'walk':''}" style="--lc:${g.color||'#8a93a0'}"><span class="mvlabel">${w?'도보':g.line}</span><span class="mvline"></span><span class="mvmin">${g.min||''}</span></span><span class="mvnode">${g.to}</span>`; });
  const btn=mv.gmaps?`<a class="movebtn" target="_blank" rel="noopener" href="https://www.google.com/maps/dir/?api=1&travelmode=transit&origin=${enc(mv.gmaps.o)}&destination=${enc(mv.gmaps.d)}">${TRAIN}대중교통 길찾기(지도)</a>`:"";
  return `<div class="movecard"><div class="movestrip">${s}</div>${mv.total?`<div class="movetotal">총 ${mv.total}</div>`:""}${btn}</div>`;
}

/* 전체 일정 한눈에 (대략 시간축 간트) */
function approxRange(t){
  t=(t||"").trim();
  const m=t.match(/(\d{1,2}):(\d{2})/);
  if(m){const h=+m[1]+(+m[2])/60; const dur=/~/.test(t)?2:/10:00/.test(t)?2:1; return [h,Math.min(h+dur,23)];}
  const map={"오픈런":[9,10.5],"오전":[9.5,12],"점심":[12,13.5],"낮":[12.5,15.5],"쇼핑":[13.5,16],"오후":[15,18],"카페":[15.5,16.5],"식후":[20,21],"저녁":[18,20],"마무리":[20.5,22],"밤":[21,22.5]};
  return map[t]||null;
}

function renderOver(){
  const AX0=8, AX1=23, span=AX1-AX0, hours=[8,10,12,14,16,18,20,22];
  let rows="";
  DAYS.forEach(day=>{
    let cursor=null, blocks="";
    mergedStops(day).forEach(st=>{
      let r=approxRange(timeOf(st));
      if(!r){ const s=cursor!=null?cursor:10; r=[s,s+1.3]; }
      if(cursor!=null && r[0]<cursor){ const d=r[1]-r[0]; r=[cursor,cursor+d]; }
      cursor=r[1];
      const left=(r[0]-AX0)/span*100, w=Math.max((r[1]-r[0])/span*100,3.5);
      blocks+=`<div class="g-block" style="left:${left}%;width:${w}%;background:${st.tag?TAGCOLOR[st.tag]:(st._add?'#16a34a':'#9aa3ad')}"><span>${st.n}</span></div>`;
    });
    rows+=`<div class="gantt-day"><div class="g-label" style="color:var(${day.c})">${day.d}일<br><span>${day.dow}</span></div><div class="g-track">${hours.map(h=>`<span class="g-grid" style="left:${(h-AX0)/span*100}%"></span>`).join("")}${blocks}</div></div>`;

async function routeBetween(a,b){

  try{
    const u=`https://router.project-osrm.org/route/v1/driving/${a.lon},${a.lat};${b.lon},${b.lat}?overview=full&geometries=geojson`;
    const j=await (await fetch(u)).json();
    if(!j.routes||!j.routes.length){ if(out) out.innerHTML="경로 계산 실패 — ‘구글 대중교통’ 버튼을 이용하세요."; return; }
    const rt=j.routes[0], km=rt.distance/1000, walkMin=Math.max(1,Math.round(km/4.8*60)), taxiMin=Math.max(1,Math.round(rt.duration/60));
    const near=km<1.5, ll=rt.geometry.coordinates.map(c=>[c[1],c[0]]);
    function draw(color){ routeLayer.clearLayers(); const pl=L.polyline(ll,{color,weight:6,opacity:.9}).addTo(routeLayer); BIGMAP.fitBounds(pl.getBounds(),{padding:[34,34]}); }
    function pick(m){ out.querySelectorAll(".mode-opt").forEach(e=>e.classList.toggle("sel",e.dataset.m===m)); if(m==="walk") draw("#0f766e"); else if(m==="taxi") draw("#1f2a37"); else window.open(gurl,"_blank"); }
    if(out){
      out.innerHTML=`<div class="rp-hint">${a.name||a.l} → ${b.name||b.l} · 거리 약 ${km.toFixed(1)}km · <b style="color:var(--teal-ink)">${near?"근거리 → 도보 추천":"장거리 → 대중교통 추천"}</b></div>`
        +`<button class="mode-opt ${near?"sel rec":""}" data-m="walk">🚶 도보 · ${km.toFixed(1)}km · 약 ${walkMin}분</button>`
        +`<button class="mode-opt ${!near?"rec":""}" data-m="transit">🚇 대중교통(지하철·버스) · 구글에서 대안 보기·선택 →</button>`
        +`<button class="mode-opt" data-m="taxi">🚕 택시·차 · ${km.toFixed(1)}km · 약 ${taxiMin}분</button>`;
      out.querySelectorAll(".mode-opt").forEach(btn=>btn.addEventListener("click",()=>pick(btn.dataset.m)));
    }
    if(near) draw("#0f766e");
  }catch(e){ if(out) out.innerHTML="경로 계산 실패 — ‘구글 대중교통’ 버튼을 이용하세요."; }
}

function mergedStops(day){
  const base=day.stops.map((s,i)=>({...s,_i:i,_key:"b"+i,order:i}));
  const adds=addsFor(day.d).map(a=>({...a,_add:true,_key:a.id}));

    <div style="margin-top:10px">${mapLink("小倉城")}</div>${gallery("festival")}
    <div class="note">출처: とくなび福岡 / ささっとー (2026.6 확인).</div></div>`;
}

/* ===================== 상태 ===================== */
const KEY = "fukuoka2026.v3";
let STATE = {};
try{ STATE = JSON.parse(localStorage.getItem(KEY) || "{}"); }catch(e){ STATE = {}; }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(STATE)); }catch(e){} sbPush(); }
function applyState(){
  document.querySelectorAll(".js-toggle, .js-check").forEach(el=>{
    let on = !!STATE[el.dataset.id];
    if(el.dataset.default && STATE[el.dataset.id]===undefined) on = true;
    el.classList.toggle("is-on", on);
    const tgt = el.dataset.target; if(tgt){ const p=el.closest(tgt); if(p) p.classList.toggle("done", on); }
  });
}
document.addEventListener("click", e=>{
  const _add=e.target.closest(".js-add"); if(_add){ ADDUI={d:_add.dataset.d, pos:+_add.dataset.pos}; TIMEUI=null; rerenderPlan(); const i=document.getElementById("addInput"); if(i) i.focus(); return; }
  if(e.target.closest(".js-addcancel")){ ADDUI=null; rerenderPlan(); return; }
  const _go=e.target.closest(".js-addgo"); if(_go){ doGeocode(_go.dataset.d,+_go.dataset.pos); return; }
  const _res=e.target.closest(".js-addres"); if(_res){ addStop(_res.dataset.d,+_res.dataset.pos,_res.dataset.name,_res.dataset.q,_res.dataset.lat,_res.dataset.lon,_res.dataset.cat,_res.dataset.disp); return; }
  const _del=e.target.closest(".js-del"); if(_del){ delAdd(_del.dataset.d,_del.dataset.id); return; }
  const _tm=e.target.closest(".js-time"); if(_tm){ TIMEUI=_tm.dataset.k; ADDUI=null; rerenderPlan(); return; }
  const _fb=e.target.closest(".floorbtn"); if(_fb){ const mall=_fb.closest(".mall"); if(mall){ const fv=mall.querySelector(".floorview"); if(fv) fv.innerHTML=floorView(_fb.dataset.mq,+_fb.dataset.fi); mall.querySelectorAll(".floorbtn").forEach(b=>b.classList.toggle("sel",b===_fb)); } return; }
  const _foc=e.target.closest(".js-focus"); if(_foc&&_foc.dataset.q){ focusPlace(_foc.dataset.q); return; }
  const _md=e.target.closest(".js-memodel"); if(_md){ STATE.memos=(STATE.memos||[]).filter(m=>m.id!==_md.dataset.id); save(); renderMemo(); return; }
  const _id=e.target.closest(".js-itemdel"); if(_id){ STATE.del=STATE.del||{}; STATE.del[_id.dataset.id]=1; save(); const p=tabOfId(_id.dataset.id); if(p) rerenderTabP(p); return; }
  const _ua=e.target.closest(".js-udadd"); if(_ua){ const pre=_ua.dataset.prefix, inp=document.getElementById("udin_"+pre), v=((inp&&inp.value)||"").trim(); if(!v){ toast("이름을 적어주세요"); return; } STATE.ud=STATE.ud||{}; STATE.ud[pre]=STATE.ud[pre]||[]; STATE.ud[pre].push({id:"u"+pre+(STATE._seq=(STATE._seq||0)+1),n:v}); save(); rerenderTabP(pre); toast("추가됨"); return; }
  const el = e.target.closest(".js-toggle, .js-check");
  if(el){ STATE[el.dataset.id] = !el.classList.contains("is-on"); save(); applyState(); return; }
  const th = e.target.closest("[data-full]");
  if(th){ $("#lbimg").src = th.dataset.full; $("#lb").classList.add("show"); return; }
  if(e.target.closest("#lb")){ $("#lb").classList.remove("show"); return; }
  const cp = e.target.closest(".copy");
  if(cp){ const t=cp.dataset.copy; (navigator.clipboard?navigator.clipboard.writeText(t):Promise.reject()).then(()=>toast("복사됨: "+t)).catch(()=>toast(t)); }
});
document.addEventListener("change", e=>{
  const ts=e.target.closest(".js-timesel");
  if(ts){ STATE.times=STATE.times||{}; const k=ts.dataset.k, v=ts.value; if(v) STATE.times[k]=v; else delete STATE.times[k]; TIMEUI=null; save(); rerenderPlan(); refreshMap(); }
});

/* ===================== 지도 (깔끔 · 연결선 없음) ===================== */
let MAP = null;
function initMap(){ /* 지도는 구글 임베드 iframe으로 대체 */ }

/* ===================== 탭 ===================== */
function buildNav(){
  $("#tabbar").innerHTML = NAV.map(t=>`<button data-tab="${t.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${t.icon}</svg>${t.label}</button>`).join("");
  document.querySelectorAll("#tabbar button").forEach(b=> b.addEventListener("click", ()=>activate(b.dataset.tab)));
}
function activate(id){
  document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("active", p.id==="tab-"+id));
  document.querySelectorAll("#tabbar button").forEach(b=>b.classList.toggle("active", b.dataset.tab===id));
  STATE.__tab = id; save(); window.scrollTo({top:0});
  if(id==="plan" && MAP) setTimeout(()=>MAP.invalidateSize(), 120);
}
function setDday(){ try{ const now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate()),ds=new Date(2026,6,15),de=new Date(2026,6,20);
  const diff=Math.round((ds-today)/86400000); $("#dday").textContent = today<ds?"D-"+diff:today<=de?"여행중":"여행끝"; }catch(e){} }
let toastTimer; function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1600); }
$("#resetBtn").addEventListener("click", ()=>{ if(confirm("초기화할까요?")){ const tab=STATE.__tab; STATE={}; if(tab)STATE.__tab=tab; save(); applyState(); toast("초기화 완료"); } });

function renderMemo(){
  const esc=s=>(s||"").replace(/</g,"&lt;");
  const list=(STATE.memos||[]).map(m=>`<div class="memo-item"><div class="memo-h"><b>${esc(m.who)||"익명"}</b><button class="js-memodel delbtn" data-id="${m.id}">삭제</button></div><div class="memo-t">${esc(m.text)}</div></div>`).join("");
  $("#tab-memo").innerHTML=`<div class="intro">각자 가고 싶은 곳·먹고 싶은 것·요청을 자유롭게 적어요.<br>☁ 실시간 동기화 — 적으면 모두에게 바로 공유됩니다.</div>
    <div class="card"><input id="memoWho" class="addinput" placeholder="이름(선택)" style="margin-bottom:7px"><textarea id="memoText" class="memo-input" placeholder="예: 19일 저녁은 야타이 가고 싶어요 / 라멘 한 번은 꼭!"></textarea><button id="memoAdd" class="bigbtn" style="margin-top:9px">＋ 요청 추가</button></div>
    ${list?`<div class="card">${list}</div>`:`<div class="note" style="text-align:center;padding:14px">아직 요청이 없어요. 위에 적어보세요.</div>`}`;
  const a=$("#memoAdd"); if(a) a.addEventListener("click",()=>{ const t=($("#memoText").value||"").trim(); if(!t){ toast("내용을 적어주세요"); return; } STATE.memos=STATE.memos||[]; STATE.memos.unshift({id:"m"+(STATE._seq=(STATE._seq||0)+1),who:($("#memoWho").value||"").trim(),text:t}); save(); renderMemo(); toast("요청 추가됨"); });
}
/* ===== 실시간 동기화 (Supabase) ===== */
const SB_URL="https://diqdtagnoevjljapsdnh.supabase.co";
const SB_KEY="sb_publishable_dWJgI5gYMyDXQhjrYrZvFg_1ks5gLc9";
let sb=null, sbReady=false, lastSync="", pushTimer=null;
function renderAll(){ renderOver(); renderPlan(); renderItems($("#tab-food"),FOOD,"food"); renderItems($("#tab-place"),PLACES,"place"); renderDecide(); renderPack(); renderInfo(); renderMemo(); applyState(); if(BIGMAP) setFilter(CURDAY||"all"); }
function adoptRemote(r){ lastSync=JSON.stringify(r); const tab=STATE.__tab; STATE=Object.assign({},r); if(tab)STATE.__tab=tab; try{localStorage.setItem(KEY,JSON.stringify(STATE));}catch(e){} renderAll(); }
function sbPush(){ if(!sb||!sbReady) return; clearTimeout(pushTimer); pushTimer=setTimeout(async()=>{ const c={...STATE}; delete c.__tab; lastSync=JSON.stringify(c); try{ await sb.from("trip_state").update({data:c,updated_at:new Date().toISOString()}).eq("id","fukuoka"); }catch(e){} },600); }
async function sbInit(){
  if(typeof supabase==="undefined") return;
  try{ sb=supabase.createClient(SB_URL,SB_KEY); sbReady=true; }catch(e){ return; }
  try{ const {data}=await sb.from("trip_state").select("data").eq("id","fukuoka").maybeSingle(); const r=data&&data.data; if(r&&Object.keys(r).length) adoptRemote(r); else sbPush(); }catch(e){}
  try{ sb.channel("trip-fukuoka").on("postgres_changes",{event:"*",schema:"public",table:"trip_state",filter:"id=eq.fukuoka"},p=>{ const r=p&&p.new&&p.new.data; if(r){ const rs=JSON.stringify(r); if(rs!==lastSync) adoptRemote(r); } }).subscribe(s=>{ if(s==="SUBSCRIBED") toast("실시간 동기화 ON"); }); }catch(e){}
}
renderOver(); renderPlan(); renderItems($("#tab-food"),FOOD,"food"); renderItems($("#tab-place"),PLACES,"place"); renderDecide(); renderPack(); renderInfo(); renderMemo();
buildNav(); applyState(); setDday(); buildBigMap(); fillRouteUI();
document.getElementById("mapOpen").addEventListener("click",()=>{document.getElementById("mappane").classList.add("open"); if(BIGMAP) setTimeout(()=>BIGMAP.invalidateSize(),220);});
document.getElementById("mapClose").addEventListener("click",()=>document.getElementById("mappane").classList.remove("open"));
activate(STATE.__tab && NAV.some(n=>n.id===STATE.__tab) ? STATE.__tab : "over");
setTimeout(()=>{ if(BIGMAP) BIGMAP.invalidateSize(); },350);
sbInit();
</script>
